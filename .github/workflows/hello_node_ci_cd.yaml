name: Hello Node.js CI & CD
on: 
  push:
    branches:
      - main
    paths:
      - docker/app1-hello/node/**

  workflow_dispatch:
    
jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Install dependencies
        working-directory: docker/app1-hello/node
        run: npm ci

      - name: Run tests
        working-directory: docker/app1-hello/node
        run: npm test --if-present

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker/app1-hello/node
          push: true
          tags: abdulwahidh/hello-node:latest

  deploy-aws-eks:
      runs-on: ubuntu-latest
      needs: docker-build-push
      steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v5.1.1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-south-1

        - name: Setup kubectl
          uses: azure/setup-kubectl@v4

        - name: Update Kubeconfig for EKS
          run: |
            aws eks update-kubeconfig --region ap-south-1 --name hello-cluster

        - name: verfiy connection
          run: kubectl get nodes

        - name: Deploy to EKS
          run: |
            kubectl apply -f k8s/aws/app.yaml