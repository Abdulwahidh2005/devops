apiVersion: apps/v1
kind: Deployment
metadata:
  name: mynodeapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mynodeapp
  template:
    metadata:
      labels:
        app: mynodeapp
    spec:
      containers:
        - name: mynodeapp
          image: embarkx/hello-node
          ports:
            - containerPort: 3000
          env:
            - name: ENV_VALUE
              value: "Hello from app.yaml!"


---
apiVersion: v1
kind: Service
metadata:
  name: mynodeapp
spec:
  selector:
    app: mynodeapp
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
